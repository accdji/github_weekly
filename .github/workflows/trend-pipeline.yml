name: Trend Pipeline

on:
  workflow_dispatch:
    inputs:
      sync_all_stars:
        description: "Sync all tracked repositories star history before rebuilding weekly rankings"
        required: false
        default: "false"
  schedule:
    # 01:00 UTC = 09:00 Asia/Shanghai
    - cron: "0 1 * * *"

jobs:
  collect-and-rank:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_SEARCH_QUERY: ${{ vars.GITHUB_SEARCH_QUERY }}
      GITHUB_TOP_LANGUAGES: ${{ vars.GITHUB_TOP_LANGUAGES }}
      COLLECT_PER_QUERY: ${{ vars.COLLECT_PER_QUERY }}
      GITHUB_STAR_HISTORY_DAYS: ${{ vars.GITHUB_STAR_HISTORY_DAYS }}
      GITHUB_STAR_HISTORY_MAX_PAGES: ${{ vars.GITHUB_STAR_HISTORY_MAX_PAGES }}
      JOB_TRIGGERED_BY: github-actions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production environment
        run: npm run env:check:prod

      - name: Generate Prisma client for PostgreSQL
        run: npm run prisma:generate:prod

      - name: Push Prisma schema
        run: npm run db:push:prod

      - name: Run trend pipeline
        run: |
          if [ "${{ github.event.inputs.sync_all_stars }}" = "true" ]; then
            npm run pipeline:run -- --sync-all-stars
          else
            npm run pipeline:run
          fi

      - name: Sync collections
        run: npm run collections:sync
